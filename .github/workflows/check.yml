name: Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint (biome)
        run: bun run lint

      - name: Doc-count drift guard
        run: bun scripts/check-doc-counts.ts

  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run semgrep
        run: |
          pip install semgrep
          semgrep --config auto --error --exclude tests/

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test --coverage --coverage-threshold=85

  publish-dry-run:
    name: Publish (dry run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: |
          bun run build
          bun run build:types

      - name: Pack (dry run)
        # Validates that the tarball builds cleanly with the configured
        # `files` entry. `bun publish --dry-run` insists on npm auth even
        # for dry-runs; `npm pack --dry-run` does the same validation
        # without authentication and prints the file list.
        run: npm pack --dry-run

  e2e-hook-kit:
    name: E2E (hook-kit)
    runs-on: ubuntu-latest
    # The e2e script builds feats, links it into a sibling hook-kit
    # checkout, and runs hook-kit's feature tests against the linked
    # build. This is the only CI gate that exercises the *published*
    # surface against a real consumer; the unit tests cover internals.
    steps:
      - name: Checkout feats
        uses: actions/checkout@v4
        with:
          path: feats

      - name: Checkout hook-kit (sibling)
        uses: actions/checkout@v4
        with:
          repository: questi0nm4rk/hook-kit
          path: hook-kit
          # If hook-kit is private, set a HOOK_KIT_TOKEN secret with
          # `repo` scope and pass `token: ${{ secrets.HOOK_KIT_TOKEN }}`.
          # GITHUB_TOKEN can't cross repos.

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install hook-kit deps
        working-directory: hook-kit
        run: bun install --frozen-lockfile

      - name: Run hook-kit E2E (also verifies FEATS_REPORTERS=pretty pipeline)
        working-directory: feats
        env:
          HOOK_KIT_DIR: ${{ github.workspace }}/hook-kit
        run: bash scripts/e2e-hook-kit.sh
