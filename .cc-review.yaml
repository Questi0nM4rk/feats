version: 1
mode: standard
auto_review: true

languages:
  - typescript

ignore_paths:
  - "docs/**"
  - "**/*.md"
  - "dist/**"
  - "node_modules/**"

instructions: |
  BDD/Gherkin test framework for Bun runtime.
  Uses @cucumber/gherkin + @cucumber/cucumber-expressions for parsing.
  TypeScript with Bun-native APIs — no Node.js compat layers.
  Exports two entry points: feats.ts (main) and bun-plugin.ts (Bun plugin).
  No `any` types — use `unknown` + type guards at boundaries.
  No `!` non-null assertions — handle undefined explicitly.
  Biome for linting.

known_patterns: []

slop_detection: true
memory: true
