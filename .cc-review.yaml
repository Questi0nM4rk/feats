version: 1
mode: standard
auto_review: true

languages:
  - typescript

ignore_paths:
  - "docs/**"
  - "**/*.md"

instructions: |
  BDD/Gherkin test framework for Bun runtime.
  Uses @cucumber/gherkin parser and @cucumber/cucumber-expressions for step matching.
  Key patterns: step registry (Given/When/Then/Step), cucumber expressions, fixture management.
  Tests use bun:test integration — runFeatures() wraps scenarios in describe/test blocks.
  No `any` types — use `unknown` + Zod at boundaries.
  No `!` non-null assertions — handle undefined explicitly.
  Max 200 lines per file. Bun >= 1.2.0 runtime.

known_patterns:
  - "StepRegistry.getAll() is snapshotted at runFeatures() call time to avoid lifecycle races"
  - "SeededRng uses Mulberry32 — deterministic, pure math, no external deps"
  - "FixtureProject paths are validated to prevent directory traversal"
  - "createDataTable rows are defensively copied on construction"

slop_detection: true
memory: true
